name: Publish pages

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

concurrency:
  group: cfg:publish-pages~${{ github.repository }}~${{ github.workflow }}~${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: coursier/cache-action@v8
      - uses: coursier/setup-action@v3
        with:
          apps: sbt
          jvm: temurin:17
      - uses: actions/configure-pages@v6
      - shell: bash
        run: ./pages.sh
      - uses: actions/upload-pages-artifact@v4
        with:
          path: target/pages
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
